name: Monthly Eraser run

# Opt into Node.js 24 for JavaScript-based actions to avoid Node 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  schedule:
    # Runs at 00:00 UTC on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build
        run: go build -o eraser ./cmd/eraser

      - name: Run Eraser (live run)
        env:
          ERASER_FIRST_NAME: ${{ secrets.ERASER_FIRST_NAME }}
          ERASER_LAST_NAME: ${{ secrets.ERASER_LAST_NAME }}
          ERASER_EMAIL: ${{ secrets.ERASER_EMAIL }}
          ERASER_EMAIL_PROVIDER: ${{ secrets.ERASER_EMAIL_PROVIDER }}
          ERASER_TEMPLATE: ${{ secrets.ERASER_TEMPLATE }}
          ERASER_SMTP_HOST: ${{ secrets.ERASER_SMTP_HOST }}
          ERASER_SMTP_PORT: ${{ secrets.ERASER_SMTP_PORT }}
          ERASER_SMTP_USERNAME: ${{ secrets.ERASER_SMTP_USERNAME }}
          ERASER_SMTP_PASSWORD: ${{ secrets.ERASER_SMTP_PASSWORD }}
          ERASER_LIVE_RUN: ${{ secrets.ERASER_LIVE_RUN }}
          ERASER_ADDRESS: ${{ secrets.ERASER_ADDRESS }}
          ERASER_CITY: ${{ secrets.ERASER_CITY }}
          ERASER_STATE: ${{ secrets.ERASER_STATE }}
          ERASER_ZIP_CODE: ${{ secrets.ERASER_ZIP_CODE }}
          ERASER_COUNTRY: ${{ secrets.ERASER_COUNTRY }}
          ERASER_PHONE: ${{ secrets.ERASER_PHONE }}
        run: |
          # Create config file from secrets so eraser can load settings in CI
          mkdir -p "$HOME/.eraser"
          cat > "$HOME/.eraser/config.yaml" <<EOF
profile:
  first_name: "${ERASER_FIRST_NAME}"
  last_name: "${ERASER_LAST_NAME}"
  email: "${ERASER_EMAIL}"
  address: "${ERASER_ADDRESS}"
  city: "${ERASER_CITY}"
  state: "${ERASER_STATE}"
  zip_code: "${ERASER_ZIP_CODE}"
  country: "${ERASER_COUNTRY}"
  phone: "${ERASER_PHONE}"

email:
  provider: "${ERASER_EMAIL_PROVIDER}"
  from: "${ERASER_EMAIL}"
  smtp:
    host: "${ERASER_SMTP_HOST}"
    port: ${ERASER_SMTP_PORT}
    username: "${ERASER_SMTP_USERNAME}"
    password: "${ERASER_SMTP_PASSWORD}"
    use_tls: true

options:
  template: "${ERASER_TEMPLATE}"
  rate_limit_ms: 2000
  dry_run: false
EOF
          chmod 600 "$HOME/.eraser/config.yaml"

          echo "--- config file ---"
          sed -e 's/password:.*/password: [REDACTED]/' "$HOME/.eraser/config.yaml"
          echo "--- config file info ---"
          ls -l "$HOME/.eraser/config.yaml" || true

          # If ERASER_LIVE_RUN is set to 'true' the workflow will perform a live send.
          if [ "${ERASER_LIVE_RUN}" = "true" ]; then
            echo "ERASER_LIVE_RUN=true — performing live send"
            ./eraser send --config "$HOME/.eraser/config.yaml" 2>&1 | tee eraser-output.txt
          else
            echo "ERASER_LIVE_RUN!=true — performing dry-run"
            ./eraser send --config "$HOME/.eraser/config.yaml" --dry-run 2>&1 | tee eraser-output.txt
          fi

          echo "--- eraser-output.txt info ---"
          ls -l eraser-output.txt || true
          wc -c eraser-output.txt || true
          echo "--- head of eraser-output.txt ---"
          head -n 200 eraser-output.txt || true

      - name: Upload run output
        uses: actions/upload-artifact@v4
        with:
          name: eraser-output
          path: eraser-output.txt

  notify:
    name: Email summary
    runs-on: ubuntu-latest
    needs: send
    steps:
      - name: Download run output
        uses: actions/download-artifact@v4
        with:
          name: eraser-output

      - name: Send summary email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.ERASER_SMTP_HOST }}
          server_port: ${{ secrets.ERASER_SMTP_PORT }}
          username: ${{ secrets.ERASER_SMTP_USERNAME }}
          password: ${{ secrets.ERASER_SMTP_PASSWORD }}
          subject: "Eraser monthly run results"
          to: ${{ secrets.ERASER_EMAIL }}
          from: ${{ secrets.ERASER_SMTP_USERNAME }}
          body: |
            Attached is the run output from the monthly Eraser workflow. Review for any follow-up tasks.

            Live run enabled: ${{ secrets.ERASER_LIVE_RUN }}
          attachments: eraser-output.txt
